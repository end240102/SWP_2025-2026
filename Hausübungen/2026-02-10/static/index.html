<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funktionen</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <!-- Aufgabe erledigt: 1. JS-Funktion ✓ 2. CSS ✓ 3. Button ✓ -->
    <main>
        <h1>Funktionen</h1>
        
        <div class="input-group">
            <input type="number" name="start" id="start" placeholder="enter start" value="0">
            <input type="number" name="end" id="end" placeholder="enter end" value="10">
            <input type="number" name="step" id="step" placeholder="enter step" value="1">
            <button id="calculate">Berechnen</button>
        </div>
        
        <div class="content-row">
            <section>
                <h2>Werte-Tabelle</h2>
                <table>
                    <thead>
                        <tr>
                            <td>x</td>
                            <td>f(x)</td>
                            <td>g(x)</td>
                            <td>h(x)</td>
                            <td>i(x)</td>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                    </tbody>
                </table>
            </section>
            
            <section>
                <h2>Grafik</h2>
                <canvas id="chart" width="600" height="400"></canvas>
            </section>
        </div>
    </main>
</body>
</html>
