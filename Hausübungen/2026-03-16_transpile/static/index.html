<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script type="module" src="main.js"></script>
  <title>essen</title>
</head>

<body>

  <h1>Essensliste</h1>

  <button id="hole-essen">Hole Essen</button>
  <button id="loesche-essen">Lösche Essen</button>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Essen</th>
      </tr>
    </thead>
    <tbody id="tabelle"></tbody>
  </table>

  <h2>Zeit Converter</h2>

  <div class="converter">
    <input id="zeit-input" type="text" placeholder="z.B. 2s oder 500ms">
    <button id="convert">Convert</button>
    <p id="result">Ergebnis erscheint hier</p>
  </div>

</body>

</html>
